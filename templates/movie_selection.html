{% extends "base.html" %}

{% block bodyclass %} selection{% endblock %}

{% block content %}
    <main class="movie-selection" style="min-height: 100vh; height: 100vh;">
        <!-- Background Layer -->
        {% if background_image %}
        <div class="movie-bg-layer" style="background-image: url('{{ background_image }}');"></div>
        {% endif %}

        <section class="movie-search">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-6">
                        <div class="search-wrapper">
                            <h1>Find movies to watch</h1>
                            <input id="movie-search-input" class="form-control form-control-lg" type="text" placeholder="Enter your favorite movie..." autocomplete="off">
                            <div id="movie-search-results" class="search-results"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
{% endblock %}

{% block modal %}
    <div class="modal fade" id="movie-confirm-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <!-- Load Modal -->
        </div>
    </div>
{% endblock %}
