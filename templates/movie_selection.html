{% extends "base.html" %}

{% block bodyclass %} selection{% endblock %}

{% block content %}
    <main class="movie-selection">
        <!-- TODO – add random poster background -->
        <section class="movie-search">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-6">
                        <div class="search-wrapper">
                            <h1>Find your favorite movie</h1>

                            <input id="movie-search-input" class="form-control form-control-lg" type="text" placeholder="Search for your favorite movie..." autocomplete="off">

                            <div id="movie-search-results" class="search-results"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>


{% endblock %}

{% block modal %}
    <div class="modal fade" id="movieConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-body">
                    <div id="movie-confirm-content">
                        Loading...
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        Choose another
                    </button>

                    <button type="button" id="confirm-movie-button" class="btn btn-primary">
                        Confirm movie
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay d-none">
        <div class="text-center">
            <div class="spinner-border text-light mb-3" role="status"></div>
            <h2>Generating recommendations...</h2>
            <p>Please wait.</p>
        </div>
    </div>
{% endblock %}
