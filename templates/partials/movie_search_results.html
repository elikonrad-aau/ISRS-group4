{% load static %}
{% for movie in movies %}
<button
   type="button"
   class="search-result w-100 text-start p-3"
   data-movie-id="{{ movie.movie_id }}"
   data-title="{{ movie.display_title }}"
   >
   <div class="row align-items-center g-3">
      <div class="col-auto">
         <img
            class="poster object-fit-cover"
            src="{% static 'posters/' %}{{ movie.movie_id }}.jpg"
            alt="{{ movie.display_title }}"
            onerror="this.onerror=null; this.src='{% static 'img/placeholder.jpg' %}';"
            >
      </div>
      <div class="col">
         <div class="fw-semibold mb-1">
            {{ movie.display_title }}
         </div>
         {% include "partials/movie_meta.html" %}
      </div>
   </div>
</button>
{% empty %}
<div class="search-result muted p-3">
   No movies found
</div>
{% endfor %}
