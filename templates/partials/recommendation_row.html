{% load static %}

<section class="recommendation-row mb-5">
    <div class="container px-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">
                {{ row.title }}

                {% if row.description %}
                <button
                    type="button"
                    class="info border-0 bg-transparent p-0 ms-2"
                    data-bs-toggle="popover"
                    data-bs-trigger="focus"
                    data-bs-placement="bottom"
                    data-bs-content="{{ row.description }}"
                >
                    <i class="bi bi-info-circle"></i>
                </button>
                {% endif %}
            </h3>
        </div>

        {% if row.movies %}

        <div class="movie-slider" data-slider>

            <button
                type="button"
                class="slider-control slider-control-prev"
                data-slider-prev
            >
                <i class="bi bi-chevron-left"></i>
            </button>

            <div class="movie-slider-viewport">
                <div class="movie-slider-track" data-slider-track>

                    {% for movie in row.movies %}
                    <div class="card movie-card d-flex flex-column">

                        <figure class="movie-card-image">
                            <img
                                class="movie-card-poster"
                                src="{% static 'backdrops/' %}{{ movie.movie_id }}.jpg"
                                alt="{{ movie.display_title }}"
                                loading="lazy"
                                onerror="this.onerror=null; this.src='{% static 'img/placeholder.jpg' %}';"
                            >
                        </figure>

                        <div class="movie-card-content p-3">
                            <h4 class="movie-card-title">
                                {{ movie.display_title }}
                            </h4>

                            {% include "partials/movie_meta.html" with movie=movie %}
                        </div>

                        <div class="px-3 pb-3 mt-auto d-flex gap-2">


<!--                            <a-->
<!--                                href="/recommendations/?movie_id={{ movie.movie_id }}"-->
<!--                                class="btn btn-outline-primary flex-fill"-->
<!--                            >-->
<!--                                Select-->
<!--                            </a>-->

<button
    type="button"
    class="btn btn-primary px-4 py-2 flex-fill"

    hx-get="{% url 'frontend:movie_detail_modal' movie.movie_id %}"
    hx-target="#movie-detail-modal-content"

    data-bs-toggle="modal"
    data-bs-target="#movie-detail-modal">

    Movie Details
</button>

                        </div>

                    </div>
                    {% endfor %}

                </div>
            </div>

            <button
                type="button"
                class="slider-control slider-control-next"
                data-slider-next
            >
                <i class="bi bi-chevron-right"></i>
            </button>

        </div>

        {% else %}

        <div class="card bg-dark text-light">
            <div class="card-body">
                No recommendations available for this algorithm.
            </div>
        </div>

        {% endif %}

    </div>
</section>
