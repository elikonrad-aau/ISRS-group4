{% load static %}
<html lang="en">
    <head>
        <!-- Meta Tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Favicon -->
        <link rel="icon" type="image/png" sizes="96x96" href="{% static 'favicon/favicon-96x96.png' %}">
        <link rel="icon" type="image/svg+xml" href="{% static 'favicon/favicon.svg' %}">
        <link rel="shortcut icon" href="{% static 'favicon/favicon.ico' %}">
        <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}">
        <meta name="apple-mobile-web-app-title" content="RecSys">
        <link rel="manifest" href="{% static 'favicon/site.webmanifest' %}">

        <!-- CSS -->
        <link rel="stylesheet" href="{% static 'css/main.css' %}?v={% now 'U' %}">

        <!-- Website Title -->
        <title>Movie Recommender | G4: Konrad, Schwazer</title>
    </head>

    <body class="recommender{% block bodyclass %}{% endblock %}">
        <!-- Navigation -->
        {% block header %}
        {% endblock %}

        <!-- Main Content -->
        {% block content %}
        {% endblock %}

        <footer class="py-4 mt-5">
            <div class="container">

                <hr class="border-light opacity-25 my-4">

                <div class="text-center text-light opacity-50 small fw-bold">
                    Information Search & Recommendation Systems (26S)
                </div>
                <div class="text-center text-light opacity-50 small">
                    Elisabeth Konrad, Julian Schwazer
                </div>

            </div>
        </footer>

        <!-- Modal Content -->
        {% block modal %}
        {% endblock %}

        <!-- Javascript -->
        <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
        <script src="{% static 'js/movie_selection.js' %}"></script>
        <script src="{% static 'js/recommendation_slider.js' %}"></script>
        <script src="{% static 'js/popover.js' %}"></script>
        <script src="{% static 'js/htmx.js' %}"></script>

        <!-- Javascript Custom -->
        {% block javascript %}
        {% endblock %}

    </body>
</html>
