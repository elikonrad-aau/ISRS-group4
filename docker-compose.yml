services:
  web:
    build: .
    container_name: django_recommender
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: django_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  sass:
    image: node:22
    container_name: django_sass
    working_dir: /app
    volumes:
      - .:/app
    command: npm run sass:watch

volumes:
  postgres_data: